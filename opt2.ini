[custom]

enable_rule_generator=true
overwrite_original_rules=true

; ==========================================================
; 节点清洗
; ==========================================================
exclude=流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|公告|通知|Telegram|电报|群|频道|说明|客服|工单|订阅|Expire|Traffic|Reset|Official|Website

; ==========================================================
; 基础直连
; ==========================================================
ruleset=DIRECT,[]GEOSITE,private
ruleset=DIRECT,[]GEOSITE,cn

; ==========================================================
; AI
; ==========================================================
ruleset=🤖 ChatGPT,[]GEOSITE,openai

; ==========================================================
; Apple
; ==========================================================
ruleset=🍎 Apple,[]GEOSITE,apple

; ==========================================================
; Telegram
; ==========================================================
ruleset=📨 Telegram,[]GEOSITE,telegram

; ==========================================================
; 视频
; ==========================================================
ruleset=🎬 YouTube,[]GEOSITE,youtube
ruleset=🎥 Netflix,[]GEOSITE,netflix

; ==========================================================
; 开发
; ==========================================================
ruleset=🧑‍💻 GitHub,[]GEOSITE,github

; ==========================================================
; Google
; ==========================================================
ruleset=🔎 Google,[]GEOSITE,google

; ==========================================================
; Microsoft
; ==========================================================
ruleset=🪟 Microsoft,[]GEOSITE,microsoft

; ==========================================================
; X(Twitter)
; ==========================================================
ruleset=🐦 X,[]GEOSITE,twitter

; ==========================================================
; GFW兜底
; ==========================================================
ruleset=🚀 手动选择,[]GEOSITE,gfw

; ==========================================================
; 最终兜底
; ==========================================================
ruleset=🐟 漏网之鱼,[]FINAL


; ==========================================================
; 节点组
; ==========================================================

custom_proxy_group=🚀 手动选择`select`.*
custom_proxy_group=♻️ 自动选择`url-test`.*`https://cp.cloudflare.com/generate_204`300,,50

custom_proxy_group=🌐 Default`select`[]♻️ 自动选择`[]🚀 手动选择`[]DIRECT

custom_proxy_group=🤖 ChatGPT`select`[]🌐 Default`[]🚀 手动选择
custom_proxy_group=🍎 Apple`select`[]DIRECT`[]🌐 Default
custom_proxy_group=📨 Telegram`select`[]🌐 Default`[]🚀 手动选择

custom_proxy_group=🎬 YouTube`select`[]🌐 Default`[]🚀 手动选择
custom_proxy_group=🎥 Netflix`select`[]🌐 Default`[]🚀 手动选择

custom_proxy_group=🧑‍💻 GitHub`select`[]🌐 Default`[]🚀 手动选择
custom_proxy_group=🔎 Google`select`[]🌐 Default`[]🚀 手动选择
custom_proxy_group=🪟 Microsoft`select`[]DIRECT`[]🌐 Default
custom_proxy_group=🐦 X`select`[]🌐 Default`[]🚀 手动选择

custom_proxy_group=🐟 漏网之鱼`select`[]🌐 Default`[]DIRECT`[]🚀 手动选择